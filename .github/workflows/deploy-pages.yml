name: Deploy Public Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Debug — list output directories
        run: |
          echo "Available output directories:"
          ls -d output* 2>/dev/null || echo "  (none found)"
          echo ""
          echo "Analysis data files:"
          find output* -name "token_profile.json" 2>/dev/null || echo "  (none found)"

      - name: Build public site
        run: |
          python3 scripts/publish_site.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
